<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="'PingFang SC','Microsoft YaHei',sans-serif">

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#333"/>
    </marker>
  </defs>

  <!-- 背景 -->
  <rect width="1600" height="900" fill="#f8f9fa"/>

  <!-- ========== 顶部主流程 ========== -->

  <!-- 节点1 -->
  <rect x="60" y="60" width="190" height="56" rx="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="155" y="93" text-anchor="middle" font-size="14" fill="#222">用户输入应用信息</text>

  <!-- 箭头1→2 -->
  <line x1="250" y1="88" x2="318" y2="88" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 节点2 -->
  <rect x="320" y="60" width="220" height="56" rx="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="430" y="85" text-anchor="middle" font-size="14" fill="#222">信息补全机制</text>
  <text x="430" y="105" text-anchor="middle" font-size="11" fill="#666">名称语义解析 + 分类行业惯例</text>

  <!-- 箭头2→3 -->
  <line x1="540" y1="88" x2="608" y2="88" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 节点3 -->
  <rect x="610" y="60" width="220" height="56" rx="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="720" y="85" text-anchor="middle" font-size="14" fill="#222">视觉维度矩阵</text>
  <text x="720" y="105" text-anchor="middle" font-size="11" fill="#666">按分类锁定主色/风格/构图</text>

  <!-- 箭头3→4 -->
  <line x1="830" y1="88" x2="898" y2="88" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 节点4 -->
  <rect x="900" y="60" width="220" height="56" rx="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <text x="1010" y="85" text-anchor="middle" font-size="14" fill="#222">三场景生成逻辑</text>
  <text x="1010" y="105" text-anchor="middle" font-size="11" fill="#666">启动页 / 海报 / 功能图</text>

  <!-- ========== 右侧内容安全约束框 ========== -->
  <rect x="1180" y="44" width="380" height="178" rx="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <rect x="1180" y="44" width="380" height="32" rx="6" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="1370" y="65" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">内容安全强制约束</text>
  <text x="1198" y="96" font-size="12" fill="#444">1. 禁止真人 / 写实人像</text>
  <text x="1198" y="116" font-size="12" fill="#444">2. 禁止低龄 / 幼稚风</text>
  <text x="1198" y="136" font-size="12" fill="#444">3. 禁止暴力、血腥、武器</text>
  <text x="1198" y="156" font-size="12" fill="#444">4. 禁止负面情绪（悲伤、愤怒、恐惧）</text>
  <text x="1198" y="176" font-size="12" fill="#444">5. 禁止画面模糊、失焦、低分辨率</text>
  <text x="1198" y="196" font-size="12" fill="#444">6. 禁止构图不完整、主体被裁切</text>

  <!-- ========== 向下箭头 ========== -->
  <line x1="430" y1="116" x2="430" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="720" y1="116" x2="720" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="1010" y1="116" x2="1010" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ========== 底部三个表格 ========== -->

  <!-- 表格1：Step1 信息分级评估 -->
  <rect x="40" y="212" width="420" height="310" rx="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <rect x="40" y="212" width="420" height="36" rx="6" fill="#e8e8e8" stroke="#333" stroke-width="1.5"/>
  <text x="250" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Step 1 — 信息分级评估</text>
  <text x="250" y="243" text-anchor="middle" font-size="11" fill="#555">等级判断标准与策略</text>

  <!-- 表头行 -->
  <rect x="40" y="248" width="420" height="28" fill="#f5f5f5"/>
  <line x1="40" y1="248" x2="460" y2="248" stroke="#ccc" stroke-width="1"/>
  <text x="110" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">等级</text>
  <text x="240" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">判断标准</text>
  <text x="390" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">策略</text>
  <line x1="40" y1="276" x2="460" y2="276" stroke="#ccc" stroke-width="1"/>
  <line x1="160" y1="248" x2="160" y2="522" stroke="#ccc" stroke-width="1"/>
  <line x1="310" y1="248" x2="310" y2="522" stroke="#ccc" stroke-width="1"/>

  <!-- 行1 充足 -->
  <text x="100" y="300" text-anchor="middle" font-size="12" fill="#333">充足</text>
  <text x="235" y="300" text-anchor="middle" font-size="11" fill="#333">名称 + 分类 + 简介</text>
  <text x="385" y="300" text-anchor="middle" font-size="11" fill="#333">直接生成</text>
  <line x1="40" y1="312" x2="460" y2="312" stroke="#eee" stroke-width="1"/>

  <!-- 行2 一般 -->
  <text x="100" y="336" text-anchor="middle" font-size="12" fill="#333">一般</text>
  <text x="235" y="330" text-anchor="middle" font-size="11" fill="#333">名称 + 分类，</text>
  <text x="235" y="346" text-anchor="middle" font-size="11" fill="#333">无简介</text>
  <text x="385" y="330" text-anchor="middle" font-size="11" fill="#333">名称语义 +</text>
  <text x="385" y="346" text-anchor="middle" font-size="11" fill="#333">分类惯例补全</text>
  <line x1="40" y1="358" x2="460" y2="358" stroke="#eee" stroke-width="1"/>

  <!-- 行3 稀少 -->
  <text x="100" y="382" text-anchor="middle" font-size="12" fill="#333">稀少</text>
  <text x="235" y="376" text-anchor="middle" font-size="11" fill="#333">只有名称</text>
  <text x="235" y="392" text-anchor="middle" font-size="11" fill="#333">或只有分类</text>
  <text x="385" y="376" text-anchor="middle" font-size="11" fill="#333">双引擎推断</text>
  <text x="385" y="392" text-anchor="middle" font-size="11" fill="#333">后生成</text>
  <line x1="40" y1="404" x2="460" y2="404" stroke="#eee" stroke-width="1"/>

  <!-- 行4 极少 -->
  <text x="100" y="428" text-anchor="middle" font-size="12" fill="#333">极少</text>
  <text x="235" y="422" text-anchor="middle" font-size="11" fill="#333">只有一句</text>
  <text x="235" y="438" text-anchor="middle" font-size="11" fill="#333">模糊描述</text>
  <text x="385" y="422" text-anchor="middle" font-size="11" fill="#333">生成3个差异化</text>
  <text x="385" y="438" text-anchor="middle" font-size="11" fill="#333">风格方向供选</text>

  <!-- 表格2：Step2 名称语义解析 -->
  <rect x="500" y="212" width="440" height="310" rx="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <rect x="500" y="212" width="440" height="36" rx="6" fill="#e8e8e8" stroke="#333" stroke-width="1.5"/>
  <text x="720" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Step 2 — 名称语义解析</text>
  <text x="720" y="243" text-anchor="middle" font-size="11" fill="#555">从名称关键词推断视觉方向</text>

  <!-- 表头 -->
  <rect x="500" y="248" width="440" height="28" fill="#f5f5f5"/>
  <line x1="500" y1="248" x2="940" y2="248" stroke="#ccc" stroke-width="1"/>
  <text x="630" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">关键词</text>
  <text x="800" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">推断视觉方向</text>
  <line x1="500" y1="276" x2="940" y2="276" stroke="#ccc" stroke-width="1"/>
  <line x1="720" y1="248" x2="720" y2="522" stroke="#ccc" stroke-width="1"/>

  <text x="610" y="298" text-anchor="middle" font-size="11" fill="#333">龙、王国、魔法、传奇</text>
  <text x="830" y="298" text-anchor="middle" font-size="11" fill="#333">奇幻冒险游戏高饱和暖色、史诗插画</text>
  <line x1="500" y1="308" x2="940" y2="308" stroke="#eee" stroke-width="1"/>

  <text x="610" y="328" text-anchor="middle" font-size="11" fill="#333">学、教、宝、启</text>
  <text x="830" y="328" text-anchor="middle" font-size="11" fill="#333">教育/儿童柔黄嫩绿、卡通插画</text>
  <line x1="500" y1="338" x2="940" y2="338" stroke="#eee" stroke-width="1"/>

  <text x="610" y="358" text-anchor="middle" font-size="11" fill="#333">钱、财、金、贷</text>
  <text x="830" y="358" text-anchor="middle" font-size="11" fill="#333">金融商务深蓝金色、简洁专业</text>
  <line x1="500" y1="368" x2="940" y2="368" stroke="#eee" stroke-width="1"/>

  <text x="610" y="388" text-anchor="middle" font-size="11" fill="#333">跑、健、动、运</text>
  <text x="830" y="388" text-anchor="middle" font-size="11" fill="#333">运动健康活力橙绿、动感构图</text>
  <line x1="500" y1="398" x2="940" y2="398" stroke="#eee" stroke-width="1"/>

  <text x="610" y="418" text-anchor="middle" font-size="11" fill="#333">聊、友、圈、社</text>
  <text x="830" y="418" text-anchor="middle" font-size="11" fill="#333">社交珊瑚橙暖粉、温暖活跃</text>
  <line x1="500" y1="428" x2="940" y2="428" stroke="#eee" stroke-width="1"/>

  <text x="610" y="448" text-anchor="middle" font-size="11" fill="#333">音、乐、歌、播</text>
  <text x="830" y="448" text-anchor="middle" font-size="11" fill="#333">音乐娱乐律动紫蓝、艺术感</text>
  <line x1="500" y1="458" x2="940" y2="458" stroke="#eee" stroke-width="1"/>

  <text x="610" y="478" text-anchor="middle" font-size="11" fill="#333">英文 / 字母缩写</text>
  <text x="830" y="478" text-anchor="middle" font-size="11" fill="#333">科技工具冷色系、极简UI感</text>

  <!-- 表格3：Step3 分类行业惯例库 -->
  <rect x="980" y="212" width="580" height="310" rx="6" fill="white" stroke="#333" stroke-width="1.5"/>
  <rect x="980" y="212" width="580" height="36" rx="6" fill="#e8e8e8" stroke="#333" stroke-width="1.5"/>
  <text x="1270" y="228" text-anchor="middle" font-size="13" font-weight="bold" fill="#222">Step 3 — 分类行业惯例库</text>
  <text x="1270" y="243" text-anchor="middle" font-size="11" fill="#555">一级分类基础视觉指纹</text>

  <!-- 表头 -->
  <rect x="980" y="248" width="580" height="28" fill="#f5f5f5"/>
  <line x1="980" y1="248" x2="1560" y2="248" stroke="#ccc" stroke-width="1"/>
  <text x="1065" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">一级分类</text>
  <text x="1195" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">色调</text>
  <text x="1350" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">渲染风格</text>
  <text x="1490" y="267" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">构图基调</text>
  <line x1="980" y1="276" x2="1560" y2="276" stroke="#ccc" stroke-width="1"/>
  <line x1="1130" y1="248" x2="1130" y2="522" stroke="#ccc" stroke-width="1"/>
  <line x1="1260" y1="248" x2="1260" y2="522" stroke="#ccc" stroke-width="1"/>
  <line x1="1420" y1="248" x2="1420" y2="522" stroke="#ccc" stroke-width="1"/>

  <!-- 应用 -->
  <text x="1055" y="300" text-anchor="middle" font-size="12" fill="#333">应用</text>
  <text x="1195" y="294" text-anchor="middle" font-size="11" fill="#333">冷色/中性</text>
  <text x="1195" y="308" text-anchor="middle" font-size="11" fill="#333">（蓝灰白）</text>
  <text x="1340" y="300" text-anchor="middle" font-size="11" fill="#333">扁平插画/UI感</text>
  <text x="1490" y="300" text-anchor="middle" font-size="11" fill="#333">极简留白</text>
  <line x1="980" y1="316" x2="1560" y2="316" stroke="#eee" stroke-width="1"/>

  <!-- 游戏 -->
  <text x="1055" y="344" text-anchor="middle" font-size="12" fill="#333">游戏</text>
  <text x="1195" y="332" text-anchor="middle" font-size="11" fill="#333">高饱和暖色</text>
  <text x="1195" y="348" text-anchor="middle" font-size="11" fill="#333">（金红深紫）</text>
  <text x="1340" y="336" text-anchor="middle" font-size="11" fill="#333">3D渲染/</text>
  <text x="1340" y="350" text-anchor="middle" font-size="11" fill="#333">概念艺术</text>
  <text x="1490" y="344" text-anchor="middle" font-size="11" fill="#333">戏剧性史诗感</text>
  <line x1="980" y1="362" x2="1560" y2="362" stroke="#eee" stroke-width="1"/>

  <!-- 小游戏 -->
  <text x="1055" y="390" text-anchor="middle" font-size="12" fill="#333">小游戏</text>
  <text x="1195" y="378" text-anchor="middle" font-size="11" fill="#333">糖果色</text>
  <text x="1195" y="394" text-anchor="middle" font-size="11" fill="#333">（黄绿橙）</text>
  <text x="1340" y="390" text-anchor="middle" font-size="11" fill="#333">卡通/Q版/像素</text>
  <text x="1490" y="390" text-anchor="middle" font-size="11" fill="#333">活泼欢快</text>
  <line x1="980" y1="408" x2="1560" y2="408" stroke="#eee" stroke-width="1"/>

  <!-- 快应用 -->
  <text x="1055" y="436" text-anchor="middle" font-size="12" fill="#333">快应用</text>
  <text x="1195" y="430" text-anchor="middle" font-size="11" fill="#333">品牌主色</text>
  <text x="1195" y="446" text-anchor="middle" font-size="11" fill="#333">+ 白色</text>
  <text x="1340" y="436" text-anchor="middle" font-size="11" fill="#333">极简图标感</text>
  <text x="1490" y="436" text-anchor="middle" font-size="11" fill="#333">功能导向直接</text>
  <line x1="980" y1="454" x2="1560" y2="454" stroke="#eee" stroke-width="1"/>

  <!-- ... -->
  <text x="1055" y="480" text-anchor="middle" font-size="13" fill="#aaa">…</text>
  <text x="1195" y="480" text-anchor="middle" font-size="13" fill="#aaa">…</text>
  <text x="1340" y="480" text-anchor="middle" font-size="13" fill="#aaa">…</text>
  <text x="1490" y="480" text-anchor="middle" font-size="13" fill="#aaa">…</text>

</svg>
